name: Backend CI

on:
  push:
  pull_request:

defaults:
  run:
    working-directory: Backend

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v3

      - name: Lint
        run: ./gradlew ktlintCheck

      - name: Build & Test
        run: ./gradlew build
